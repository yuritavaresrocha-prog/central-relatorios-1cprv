<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="format-detection" content="telephone=no" />
  <title>Central de Relatórios - BPTRAN / 1ª CPRv</title>

  <style>
    :root {
      --bg: #f3f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --line: #d8e0e7;
      --accent: #0f6f8f;
      --accent2: #0f766e;
      --soft: #e8f5f8;
      --shadow: 0 8px 20px rgba(15, 23, 42, .08);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.35;
    }

    .page {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 14px;
    }

    header {
      background: #ffffff;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px 16px 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .crest {
      width: 76px;
      height: auto;
      display: block;
      margin: 0 auto 8px;
      background: #fff;
    }

    .unit {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .55px;
      text-transform: uppercase;
      color: #334155;
    }

    h1 {
      margin: 4px 0 5px;
      font-size: 23px;
      line-height: 1.08;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: #0f172a;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 680px;
      color: var(--muted);
      font-size: 12.5px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin: 12px 0;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      font: inherit;
      outline: none;
      background: #fff;
      color: var(--text);
      box-shadow: 0 2px 8px rgba(15, 23, 42, .04);
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 111, 143, .14);
    }

    button {
      font-family: inherit;
    }

    .small-btn {
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 800;
      background: #e5e7eb;
      color: #111827;
      cursor: pointer;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px;
      box-shadow: 0 3px 14px rgba(15, 23, 42, .05);
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
    }

    h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.15;
      color: #0f172a;
      text-transform: uppercase;
      letter-spacing: .25px;
    }

    .tag {
      flex: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 800;
      color: var(--accent);
      background: var(--soft);
      text-transform: uppercase;
    }

    .desc {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .link-card {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 7px;
      border: 1px solid var(--line);
      border-radius: 13px;
      padding: 10px;
      background: #fbfdff;
      min-height: 116px;
    }

    .link-title {
      font-weight: 800;
      font-size: 13px;
      color: var(--text);
      line-height: 1.2;
    }

    .link-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 9px 10px;
      font-weight: 800;
      cursor: pointer;
      font-size: 12px;
      color: #fff;
      background: var(--accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      width: 100%;
    }

    .btn.ios {
      background: var(--accent2);
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      margin: 12px 0 3px;
    }

    @media (max-width: 720px) {
      .page {
        padding: 10px;
      }

      h1 {
        font-size: 20px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .card-head {
        display: block;
      }

      .tag {
        display: inline-block;
        margin-top: 7px;
      }

      .links {
        grid-template-columns: 1fr;
      }

      .link-card {
        min-height: auto;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header>
      <img class="crest" src="brasao.png" alt="Brasão da PMPB" onerror="this.style.display='none'" />
      <div class="unit">BPTRAN / 1ª CPRv</div>
      <h1>Central de Relatórios</h1>
      <p class="subtitle">Selecione o relatório desejado para preenchimento no navegador.</p>
    </header>

    <div class="toolbar">
      <input
        id="busca"
        class="search"
        type="search"
        placeholder="Buscar relatório..."
        oninput="renderizar()"
      />
      <button class="small-btn" type="button" onclick="limparBusca()">Limpar busca</button>
    </div>

    <section id="lista" class="grid" aria-live="polite"></section>

    <div class="footer">
      Central de acesso a relatórios operacionais • BPTRAN / 1ª CPRv
    </div>
  </main>

  <script>
    const RELATORIOS = [
      {
        titulo: 'Relatório de Serviço Diário',
        etiqueta: 'Guarnições',
        descricao: 'Relatório diário das guarnições, com produção operacional, informações para o Conecta, alterações, ordem de serviço, observações e assinatura.',
        formatos: [
          {
            nome: 'Formulário Online (HTML)',
            detalhe: 'Versão para navegador em computador ou Android/Chrome.',
            url: 'relatorio_servico_diario.html',
            classe: ''
          },
          {
            nome: 'Formulário Online (iOS)',
            detalhe: 'Versão ajustada para Safari ou navegador padrão do iPhone.',
            url: 'relatorio_servico_diario_ios.html',
            classe: 'ios'
          }
        ]
      },
      {
        titulo: 'Relatório de Acionamento do Fisco Estadual',
        etiqueta: 'Fisco',
        descricao: 'Relatório de acionamento, local, relato, envolvidos, material, veículo, desfecho, observações e fotos do atendimento.',
        formatos: [
          {
            nome: 'Formulário Online (HTML)',
            detalhe: 'Versão para navegador em computador ou Android/Chrome.',
            url: 'relatorio_fisco.html',
            classe: ''
          },
          {
            nome: 'Formulário Online (iOS)',
            detalhe: 'Versão ajustada para Safari ou navegador padrão do iPhone.',
            url: 'relatorio_fisco_ios.html',
            classe: 'ios'
          }
        ]
      },
      {
        titulo: 'Relatório de CPSU',
        etiqueta: 'CPSU',
        descricao: 'Relatório operacional de serviço do CPSU, com CPU, permanente, estatísticas, somatórios, alterações durante o serviço, anexos e passagem de serviço.',
        formatos: [
          {
            nome: 'Formulário Online (HTML)',
            detalhe: 'Versão para navegador em computador ou Android/Chrome.',
            url: 'relatorio_cpu.html',
            classe: ''
          },
          {
            nome: 'Formulário Online (iOS)',
            detalhe: 'Versão ajustada para Safari ou navegador padrão do iPhone.',
            url: 'relatorio_cpu_ios.html',
            classe: 'ios'
          }
        ]
      }
    ];

    function renderizar() {
      const lista = document.getElementById('lista');
      const termo = document.getElementById('busca').value.trim().toLowerCase();

      lista.innerHTML = '';

      const filtrados = RELATORIOS.filter(relatorio => {
        const texto = [
          relatorio.titulo,
          relatorio.etiqueta,
          relatorio.descricao,
          ...relatorio.formatos.flatMap(f => [f.nome, f.detalhe])
        ].join(' ').toLowerCase();

        return !termo || texto.includes(termo);
      });

      if (!filtrados.length) {
        lista.innerHTML = `
          <article class="card">
            <h2>Nenhum relatório encontrado</h2>
            <p class="desc">Tente buscar por outro termo.</p>
          </article>
        `;
        return;
      }

      filtrados.forEach(relatorio => {
        const card = document.createElement('article');
        card.className = 'card';

        const formatos = relatorio.formatos.map(formato => `
          <div class="link-card">
            <div>
              <div class="link-title">${formato.nome}</div>
              <div class="link-sub">${formato.detalhe}</div>
            </div>
            <div></div>
            <a class="btn ${formato.classe}" href="${formato.url}">Abrir</a>
          </div>
        `).join('');

        card.innerHTML = `
          <div class="card-head">
            <h2>${relatorio.titulo}</h2>
            <span class="tag">${relatorio.etiqueta}</span>
          </div>
          <p class="desc">${relatorio.descricao}</p>
          <div class="links">${formatos}</div>
        `;

        lista.appendChild(card);
      });
    }

    function limparBusca() {
      document.getElementById('busca').value = '';
      renderizar();
    }

    renderizar();
  </script>
</body>
</html>
